image:
  api:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-api
  web:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-web

# External RP — reusing linkkeys.todandlorna.com (which has
# ENABLE_RP_ENDPOINTS=true). No sidecar in this pod. apiKey is injected
# at deploy time by deploy.sh from the LINKKEYS_PKI_API_KEY env var
# (sourced from reactorcide secret tnl/longhouse:linkkeys_api_key).
linkkeysRp:
  enabled: false
  url: "https://linkkeys.todandlorna.com"

imagePullSecrets:
  - name: regcred

database:
  url: ""  # Overridden by Zalando operator credentials in deployment

postgresql:
  enabled: true
  teamId: longhouse
  database: longhouse_db
  user: longhouse
  instances: 1
  storage:
    size: 1Gi

server:
  # Legacy api-side keys (kept for compatibility with older code paths).
  linkkeysDomain: "todandlorna.com"
  linkkeysUrl: "https://linkkeys.todandlorna.com"

  # Webapp-side login config. All three are required for /login to work —
  # the handler returns "Login is not configured on this server." if any
  # of linkkeysIdpUrl / linkkeysIdpDomain / rpCallbackUrl is empty.
  # The IDP reads relying_party from the verified signed_request CBOR,
  # so we no longer pass an `rpDomain` URL parameter / env var.
  linkkeysIdpUrl: "https://linkkeys.todandlorna.com"
  linkkeysIdpDomain: "todandlorna.com"
  rpCallbackUrl: "https://longhouse.todandlorna.com/auth/callback"

gateway:
  httpRoute:
    api:
      enabled: true
      parentGateway: contour
      parentNamespace: projectcontour
      parentSection: http
      hostnames:
        - longhouse-api.todandlorna.com
    web:
      enabled: true
      parentGateway: contour
      parentNamespace: projectcontour
      parentSection: http
      hostnames:
        - longhouse.todandlorna.com
  tcpRoute:
    # Disabled until a TCP listener is added to the contour gateway.
    # Requires adding a listener section to the Gateway resource in foundry
    # with a dedicated port for the CSIL protocol.
    enabled: false
    parentGateway: contour
    parentNamespace: projectcontour
    parentSection: longhouse-tcp
