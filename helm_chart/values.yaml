# Longhouse Helm chart values

replicaCount:
  api: 1
  web: 1

image:
  api:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-api
    pullPolicy: IfNotPresent
    tag: ""
  web:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-web
    pullPolicy: IfNotPresent
    tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Database configuration
database:
  url: "postgresql://longhouse:longhouse@longhouse-postgresql:5432/longhouse_db?sslmode=disable"

# Server configuration
server:
  apiPort: 6080
  tcpPort: 6081
  webPort: 4080
  logLevel: "info"
  # Linkkeys IDP metadata cached on the api (legacy — kept for api-side auth helpers).
  linkkeysDomain: ""
  linkkeysUrl: ""

  # Bootstrap the first admin + house when the members table is empty.
  # userId MUST be a proper UUID issued by the linkkeys IDP; anything else is refused.
  initialAdmin:
    domain: ""
    userId: ""
  initialHouseName: ""

  # Auth config — required for the browser login flow.
  appCallbackUrl: ""      # full https://.../auth/callback URL the IDP redirects users back to (the SPA's route)
  linkkeysIdpUrl: ""      # IDP base URL — the /auth/start endpoint 302s to <this>/auth/authorize
  linkkeysIdpDomain: ""   # IDP identity domain — checked against the assertion's `domain` and `audience`

  # Optional. Default behavior is "prod" — dev-auth endpoints stay 404.
  # Set env to "dev" or "nonprod" AND devAuthEnabled to true to register
  # POST /api/v1/dev/login (mints a real JWT for any seeded member, no
  # linkkeys exchange). Refuses to register in any other env.
  env: ""                 # one of "", "prod", "nonprod", "dev"
  devAuthEnabled: false

# Linkkeys RP PKI sidecar (same linkkeys image, RP-mode config). Holds this
# instance's Ed25519 keypair so the webapp never touches private keys.
#
# RP (Relying Party) configuration. Two operating modes:
#
#   A) Sidecar mode (linkkeysRp.enabled: true) — the chart deploys a
#      linkkeys container alongside the webapp pod, configured in RP
#      mode. Operator setup after first deploy:
#        1. exec into the pod and run `linkkeys domain init` to generate keys.
#        2. run `linkkeys user create longhouse-web "Longhouse webapp" --api-key`
#           and save the printed key as linkkeysRp.apiKey.
#        3. publish the TXT record shown by `linkkeys domain dns-check`.
#
#   B) External RP mode (linkkeysRp.enabled: false, linkkeysRp.url set) —
#      the webapp talks to an existing linkkeys instance with
#      ENABLE_RP_ENDPOINTS=true. Provide the URL here and an API key
#      issued by `linkkeys user create --api-key` on that instance.
linkkeysRp:
  enabled: false
  image:
    repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys
    pullPolicy: IfNotPresent
    tag: "latest"
  port: 8443
  # External RP URL. Used when `enabled: false`. Must be a fully-qualified
  # https://... pointing at a linkkeys instance with ENABLE_RP_ENDPOINTS=true.
  # If `enabled: true`, the sidecar's in-cluster Service URL wins and
  # this field is ignored.
  url: ""
  # API key for whichever RP we're talking to (sidecar or external).
  # Generate via `linkkeys user create --api-key`. Rotate by re-running.
  apiKey: ""
  domainKeyPassphrase: ""
  # Accept self-signed RP certs when the webapp calls the sidecar.
  allowInvalidCerts: false
  # Extra env vars to pass through to the linkkeys container (for any
  # deployment-specific knobs not covered above).
  extraEnv: []

# Session cookie signing secret for the webapp. REQUIRED for login to work.
# Generate with: openssl rand -base64 48
webapp:
  sessionSecret: ""

# api-only signing secret for bearer tokens issued at /api/v1/auth/login.
# REQUIRED for any client (including the webapp) to authenticate against
# the api. Generate with: openssl rand -base64 48
api:
  jwtSecret: ""

# PostgreSQL via Zalando postgres-operator
postgresql:
  enabled: false
  teamId: "longhouse"
  database: "longhouse_db"
  user: "longhouse"
  version: "17"
  instances: 1
  storage:
    size: 1Gi

# Service configuration
service:
  api:
    type: ClusterIP
    httpPort: 6080
    tcp:
      type: ClusterIP
      port: 6081
      nodePort: ""
  web:
    type: ClusterIP
    port: 4080

# Legacy Ingress (networking.k8s.io/v1)
ingress:
  api:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: longhouse-api.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  web:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: longhouse.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Gateway API (gateway.networking.k8s.io)
gateway:
  httpRoute:
    api:
      enabled: false
      parentGateway: ""
      parentNamespace: ""
      parentSection: ""
      hostnames: []
      pathPrefixes: []
    web:
      enabled: false
      parentGateway: ""
      parentNamespace: ""
      parentSection: ""
      hostnames: []
      pathPrefixes: []
  tcpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""

resources: {}

autoscaling:
  api:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  web:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
