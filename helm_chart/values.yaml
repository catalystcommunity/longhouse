# Longhouse Helm chart values

replicaCount:
  api: 1
  web: 1

image:
  api:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-api
    pullPolicy: IfNotPresent
    tag: ""
  web:
    repository: containers.catalystsquad.com/public/catalystcommunity/longhouse-web
    pullPolicy: IfNotPresent
    tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Database configuration
database:
  url: "postgresql://longhouse:longhouse@longhouse-postgresql:5432/longhouse_db?sslmode=disable"

# Server configuration
server:
  apiPort: 6080
  tcpPort: 6081
  webPort: 4080
  logLevel: "info"
  # Linkkeys IDP metadata cached on the api (legacy — kept for api-side auth helpers).
  linkkeysDomain: ""
  linkkeysUrl: ""

  # Bootstrap the first admin + house when the members table is empty.
  # userId MUST be a proper UUID issued by the linkkeys IDP; anything else is refused.
  initialAdmin:
    domain: ""
    userId: ""
  initialHouseName: ""

  # Webapp-facing auth config. Required for login to work.
  rpDomain: ""            # this longhouse instance's public hostname
  rpCallbackUrl: ""       # full https://.../auth/callback URL
  linkkeysIdpUrl: ""      # IDP base URL (for the /auth/authorize redirect)
  linkkeysIdpDomain: ""   # IDP domain (for assertion verification)

# Linkkeys RP PKI sidecar (same linkkeys image, RP-mode config). Holds this
# instance's Ed25519 keypair so the webapp never touches private keys.
#
# Operator setup after first deploy:
#   1. exec into the pod and run `linkkeys domain init` to generate keys.
#   2. run `linkkeys user create longhouse-web "Longhouse webapp" --api-key`
#      and save the printed key as linkkeysRp.apiKey.
#   3. publish the TXT record shown by `linkkeys domain dns-check`.
linkkeysRp:
  enabled: false
  image:
    repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys
    pullPolicy: IfNotPresent
    tag: "latest"
  port: 8443
  # Generate with a password manager; rotate by redeploying + re-running user create.
  apiKey: ""
  domainKeyPassphrase: ""
  # Accept self-signed RP certs when the webapp calls the sidecar.
  allowInvalidCerts: false
  # Extra env vars to pass through to the linkkeys container (for any
  # deployment-specific knobs not covered above).
  extraEnv: []

# Session cookie signing secret for the webapp. REQUIRED for login to work.
# Generate with: openssl rand -base64 48
webapp:
  sessionSecret: ""

# PostgreSQL via Zalando postgres-operator
postgresql:
  enabled: false
  teamId: "longhouse"
  database: "longhouse_db"
  user: "longhouse"
  version: "17"
  instances: 1
  storage:
    size: 1Gi

# Service configuration
service:
  api:
    type: ClusterIP
    httpPort: 6080
    tcp:
      type: ClusterIP
      port: 6081
      nodePort: ""
  web:
    type: ClusterIP
    port: 4080

# Legacy Ingress (networking.k8s.io/v1)
ingress:
  api:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: longhouse-api.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  web:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: longhouse.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Gateway API (gateway.networking.k8s.io)
gateway:
  httpRoute:
    api:
      enabled: false
      parentGateway: ""
      parentNamespace: ""
      parentSection: ""
      hostnames: []
      pathPrefixes: []
    web:
      enabled: false
      parentGateway: ""
      parentNamespace: ""
      parentSection: ""
      hostnames: []
      pathPrefixes: []
  tcpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""

resources: {}

autoscaling:
  api:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  web:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
