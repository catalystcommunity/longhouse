{{- /*
Look up the existing Secret so an upgrade preserves any random values we
generated on first install. `lookup` returns nil during `helm template`
(no cluster), so default-empty strings are fine in that path.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "longhouse.fullname" .) -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}
  {{- $existingData = $existing.data -}}
{{- end -}}
{{- $sessionSecret := .Values.webapp.sessionSecret -}}
{{- if not $sessionSecret -}}
  {{- if $existingData.LONGHOUSE_SESSION_SECRET -}}
    {{- $sessionSecret = $existingData.LONGHOUSE_SESSION_SECRET | b64dec -}}
  {{- else -}}
    {{- $sessionSecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}
{{- $jwtSecret := .Values.api.jwtSecret -}}
{{- if not $jwtSecret -}}
  {{- if $existingData.LONGHOUSE_JWT_SECRET -}}
    {{- $jwtSecret = $existingData.LONGHOUSE_JWT_SECRET | b64dec -}}
  {{- else -}}
    {{- $jwtSecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "longhouse.fullname" . }}
  labels:
    {{- include "longhouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.postgresql.enabled }}
  LONGHOUSE_DB_URI: {{ .Values.database.url | quote }}
  {{- end }}
  LONGHOUSE_SESSION_SECRET: {{ $sessionSecret | quote }}
  LONGHOUSE_JWT_SECRET: {{ $jwtSecret | quote }}
  {{- if .Values.linkkeysRp.apiKey }}
  LONGHOUSE_LINKKEYS_PKI_API_KEY: {{ .Values.linkkeysRp.apiKey | quote }}
  {{- end }}
