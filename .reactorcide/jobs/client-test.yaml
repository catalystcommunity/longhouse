name: longhouse-client-test
description: "Type-check + unit-test the SolidJS client (vitest + tsc)"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # csil/** included because the SPA imports the generated TS types from
  # client/src/api/. A CSIL change without a regen would compile but the
  # tests catch any consumer drift.
  include: ["client/**", "csil/**"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/client-test.sh"
  timeout: 900
  priority: 10
