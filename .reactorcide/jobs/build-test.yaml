name: longhouse-build-test
description: "Build and test the Go API and webapp modules"
job:
  image: 10.16.0.1:5000/public/reactorcide/runnerbase:dev
  command: |
    set -e

    # Install Go toolchain into user home (sudo only allows apt-get)
    export HOME=/home/runner
    curl -fsSL https://go.dev/dl/go1.23.8.linux-amd64.tar.gz -o /tmp/go.tar.gz
    mkdir -p "$HOME/.local"
    tar -C "$HOME/.local" -xzf /tmp/go.tar.gz
    rm /tmp/go.tar.gz
    export PATH="$HOME/.local/go/bin:$HOME/go/bin:$PATH"

    # Use mounted source for run-local, clone for CI
    if [ -n "${REACTORCIDE_SOURCE_URL:-}" ]; then
      git clone --branch "${REACTORCIDE_PR_REF}" "${REACTORCIDE_SOURCE_URL}" /workspace
      cd /workspace
    else
      cd /job/src
    fi

    # Mark repo safe for git (mounted dir may have different owner)
    git config --global --add safe.directory '*'

    echo "=== Building API ==="
    cd api
    go build ./...

    echo "=== Testing API ==="
    go test ./...

    echo "=== Building Webapp ==="
    cd ../webapp
    go build ./...

    echo "=== Testing Webapp ==="
    go test ./...

    echo "=== All builds and tests passed ==="
  timeout: 600
  priority: 10
  raw_command: true
