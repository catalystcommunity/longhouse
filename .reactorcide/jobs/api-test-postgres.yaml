name: longhouse-api-test-postgres
description: "Run api module tests against a real PostgreSQL (inline)"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # csil/** triggers too — generated handler signatures + types come
  # through the same compile path the test suite exercises.
  include: ["api/**", "coredb/**", "csil/**"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/api-test-postgres.sh"
  timeout: 1800
  priority: 10
