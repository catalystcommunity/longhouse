name: longhouse-api-test-postgres
description: "Run api module tests against a real PostgreSQL (inline)"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include: ["api/**", "coredb/**"]
job:
  image: 10.16.0.1:5000/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/api-test-postgres.sh"
  timeout: 1800
  priority: 10
