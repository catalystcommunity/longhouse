name: longhouse-api-build-test
description: "Verify the API Docker image builds successfully on PR"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # csil/** triggers too: a contract change without a regen would compile
  # against stale generated types, and this build surfaces it on the PR.
  include: ["api/**", "coredb/**", "csil/**", "Dockerfile.api"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/api-build-test.sh"
  timeout: 600
  capabilities:
    - docker
