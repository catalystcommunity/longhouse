name: longhouse-web-build-test
description: "Verify the web UI Docker image builds successfully on PR"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # Dockerfile.web now builds the SPA from client/ (Node + Vite → nginx),
  # not the Go webapp/. webapp/** stays until that directory is deleted
  # in a follow-up — its still-buildable Go code keeps the legacy
  # webapp-test job honest in the meantime.
  include: ["client/**", "webapp/**", "Dockerfile.web"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/web-build-test.sh"
  timeout: 600
  capabilities:
    - docker
