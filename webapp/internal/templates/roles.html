{{define "roles.html"}}
{{template "layout" .}}
{{end}}

{{define "content"}}
<h1>Roles</h1>

<div class="card">
    <h2>Existing</h2>
    <table>
        <thead><tr><th>Name</th><th>Description</th><th></th></tr></thead>
        <tbody>
        {{range .Roles}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Description}}</td>
                <td>
                    <form method="post" action="/app/admin/roles/{{.RoleID}}/delete">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
        {{end}}
        </tbody>
    </table>
</div>

<div class="card">
    <h2>Create role</h2>
    <form method="post" action="/app/admin/roles">
        <label>Name <input name="name" required></label>
        <label>Description <input name="description"></label>
        <button type="submit">Create</button>
    </form>
</div>
{{end}}
